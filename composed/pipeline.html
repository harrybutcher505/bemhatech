<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Composed — My Pipeline</title>
  <meta name="theme-color" content="#6C47FF" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #6C47FF;
      --text: #0f0f0f;
      --muted: #666;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --surface: #ffffff;
      --radius: 12px;
      --danger: #dc2626;
      --warn: #d97706;
      --success: #16a34a;
    }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 40px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
    .badge { font-size: 11px; font-weight: 600; color: var(--muted); background: var(--bg); padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); }

    .summary-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 20px;
    }
    .summary-stat { text-align: center; }
    .summary-stat strong { display: block; font-size: 20px; font-weight: 800; color: var(--accent); }
    .summary-stat span { font-size: 10px; color: var(--muted); font-weight: 500; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 14px 16px 6px;
    }
    .section-label.tier-a { color: var(--danger); }
    .section-label.tier-b { color: var(--warn); }
    .section-label.tier-c { color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin: 6px 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 14px 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-main { flex: 1; min-width: 0; }
    .company-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .contact-title { font-size: 12px; color: var(--muted); }
    .trigger-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .trigger-a { background: #fee2e2; color: #dc2626; }
    .trigger-b { background: #fef9c3; color: #92400e; }

    .why { font-size: 12px; color: var(--muted); padding: 0 14px 10px; line-height: 1.6; }

    /* Pipeline status pills */
    .status-row {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .status-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .status-pill.active-not_contacted { border-color: var(--muted); color: var(--muted); background: #f3f4f6; }
    .status-pill.active-sent { border-color: var(--warn); color: var(--warn); background: #fffbeb; }
    .status-pill.active-followed_up { border-color: #7c3aed; color: #7c3aed; background: #ede9fe; }
    .status-pill.active-replied { border-color: var(--success); color: var(--success); background: #f0fdf4; }

    /* Expandable email section */
    .email-toggle {
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border: none;
      border-top: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
    }
    .email-body {
      display: none;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .email-body.open { display: block; }
    .email-subject {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .email-text {
      font-size: 13px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      font-family: Georgia, serif;
    }
    .copy-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .copy-btn.copied { background: var(--success); }

    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty h2 { font-size: 18px; margin-bottom: 8px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    .footer-note {
      text-align: center;
      padding: 24px 16px 0;
      font-size: 11px;
      color: var(--muted);
    }
    .footer-note a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <span class="logo">Composed</span>
    <span class="badge" id="count-badge">Loading…</span>
  </header>

  <div id="summary-bar" class="summary-bar" style="display:none;">
    <div class="summary-stat"><strong id="stat-total">0</strong><span>companies</span></div>
    <div class="summary-stat"><strong id="stat-act-now">0</strong><span>act now</span></div>
    <div class="summary-stat"><strong id="stat-contacted">0</strong><span>contacted</span></div>
    <div class="summary-stat"><strong id="stat-replied">0</strong><span>replied</span></div>
  </div>

  <div id="app"></div>

  <div class="footer-note">
    <p>Pipeline synced from Composed desktop app · <a href="https://bemhatech.nl/composed">Get Composed →</a></p>
  </div>

  <script>
    // Pipeline status stored in sessionStorage so updates persist while browsing
    let pipeline = {};

    const STATUSES = [
      { key: "not_contacted", label: "Not contacted" },
      { key: "sent",          label: "Sent" },
      { key: "followed_up",   label: "Followed up" },
      { key: "replied",       label: "Replied ✓" },
    ];

    async function decompress(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const stream = new DecompressionStream("gzip");
      const writer = stream.writable.getWriter();
      writer.write(bytes);
      writer.close();
      const buf = await new Response(stream.readable).arrayBuffer();
      return new TextDecoder().decode(buf);
    }

    function updateStats(companies) {
      const contacted = companies.filter(c => pipeline[c.company] && pipeline[c.company] !== "not_contacted").length;
      const replied = companies.filter(c => pipeline[c.company] === "replied").length;
      const actNow = companies.filter(c => c.tier === "A").length;
      document.getElementById("stat-total").textContent = companies.length;
      document.getElementById("stat-act-now").textContent = actNow;
      document.getElementById("stat-contacted").textContent = contacted;
      document.getElementById("stat-replied").textContent = replied;
      document.getElementById("count-badge").textContent = `${companies.length} companies`;
      document.getElementById("summary-bar").style.display = "flex";
    }

    function setStatus(company, status, companies) {
      pipeline[company] = status;
      sessionStorage.setItem("pipeline", JSON.stringify(pipeline));
      // Update pill UI
      const pills = document.querySelectorAll(`[data-company="${CSS.escape(company)}"]`);
      pills.forEach(pill => {
        const s = pill.dataset.status;
        pill.className = "status-pill" + (s === status ? ` active-${status}` : "");
      });
      updateStats(companies);
    }

    function copyEmail(btn, subject, body) {
      navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`).then(() => {
        btn.textContent = "✓ Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy email"; btn.classList.remove("copied"); }, 2000);
      });
    }

    function renderCompany(c) {
      const status = pipeline[c.company] || "not_contacted";
      const isTierA = c.tier === "A";
      const isTierB = c.tier === "B";

      const card = document.createElement("div");
      card.className = "card";

      const triggerHtml = c.trigger_event
        ? `<span class="trigger-badge ${isTierA ? "trigger-a" : "trigger-b"}">${c.trigger_event}</span>`
        : "";

      const pillsHtml = STATUSES.map(s => `
        <button class="status-pill${s.key === status ? ` active-${status}` : ""}"
          data-company="${c.company.replace(/"/g, "&quot;")}"
          data-status="${s.key}">${s.label}</button>
      `).join("");

      const emailId = `email-${Math.random().toString(36).slice(2)}`;

      card.innerHTML = `
        <div class="card-header">
          <div class="card-main">
            <div class="company-name">${c.company}</div>
            <div class="contact-title">${c.contact_title}</div>
          </div>
          ${triggerHtml}
        </div>
        <div class="why">${c.why}</div>
        <div class="status-row">${pillsHtml}</div>
        <button class="email-toggle" onclick="toggleEmail('${emailId}', this)">
          <span>View drafted email</span>
          <span class="chevron">›</span>
        </button>
        <div class="email-body" id="${emailId}">
          <div class="email-subject">Subject: ${c.email_subject}</div>
          <div class="email-text">${c.email_body}</div>
          <button class="copy-btn" onclick="copyEmail(this, ${JSON.stringify(c.email_subject)}, ${JSON.stringify(c.email_body)})">Copy email</button>
        </div>
      `;

      // Wire up status pills
      card.querySelectorAll(".status-pill").forEach(pill => {
        pill.addEventListener("click", () => setStatus(c.company, pill.dataset.status, window._companies));
      });

      return card;
    }

    function toggleEmail(id, btn) {
      const el = document.getElementById(id);
      const open = el.classList.toggle("open");
      btn.querySelector(".chevron").textContent = open ? "˅" : "›";
    }

    function render(data) {
      window._companies = data.companies;

      // Restore pipeline: start with data from URL, then override with session changes
      pipeline = { ...data.pipeline, ...JSON.parse(sessionStorage.getItem("pipeline") || "{}") };

      const app = document.getElementById("app");
      app.innerHTML = "";

      const tiers = [
        { key: "A", label: "Act now" },
        { key: "B", label: "Reach out soon" },
        { key: "C", label: "Longer term" },
      ];

      let anyCompanies = false;
      tiers.forEach(tier => {
        const group = data.companies.filter(c => c.tier === tier.key);
        if (group.length === 0) return;
        anyCompanies = true;

        const label = document.createElement("div");
        label.className = `section-label tier-${tier.key.toLowerCase()}`;
        label.textContent = tier.label;
        app.appendChild(label);

        group.forEach(c => app.appendChild(renderCompany(c)));
      });

      if (!anyCompanies) {
        app.innerHTML = `<div class="empty"><h2>No companies yet</h2><p>Run the company discovery in the Composed desktop app first, then use "Open on mobile" to share your pipeline here.</p></div>`;
      }

      updateStats(data.companies);
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const d = params.get("d");
      const raw = params.get("raw");

      if (!d) {
        document.getElementById("app").innerHTML = `
          <div class="empty">
            <h2>No pipeline data</h2>
            <p>Open the Composed desktop app, run the 30-company discovery, then tap "📱 Mobile" to get a link to this page.</p>
            <p style="margin-top:16px;"><a href="https://bemhatech.nl/composed" style="color:#6C47FF;font-weight:600;">Get Composed →</a></p>
          </div>`;
        document.getElementById("count-badge").textContent = "No data";
        return;
      }

      try {
        let json;
        if (raw) {
          json = decodeURIComponent(atob(d));
        } else {
          json = await decompress(d);
        }
        const data = JSON.parse(json);
        render(data);
      } catch (e) {
        document.getElementById("app").innerHTML = `
          <div class="empty">
            <h2>Couldn't load pipeline</h2>
            <p>The link may have expired or been cut off. Generate a new link from the Composed desktop app.</p>
          </div>`;
        document.getElementById("count-badge").textContent = "Error";
      }
    }

    init();
  </script>
</body>
</html>
